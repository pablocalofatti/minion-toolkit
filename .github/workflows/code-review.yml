# Claude Code Review — automated PR review via anthropics/claude-code-action
# Requires CLAUDE_CODE_OAUTH_TOKEN secret (from `claude setup-token`)
# Install the Claude GitHub App first: https://github.com/apps/claude

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    # Run on PR events always; on comment events only when @claude is mentioned
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot]"
          show_full_output: true
          claude_args: |
            --max-turns 15 --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          prompt: |
            You are a senior staff engineer reviewing a pull request.
            Read CLAUDE.md for the engineering standards, then review ONLY the changed files.

            Use `gh pr diff ${{ github.event.pull_request.number }}` to see the diff.
            Focus exclusively on the lines that changed.

            Check for:
            1. Correctness — logic errors, race conditions, null handling
            2. Security — injection, credential exposure, unsafe input
            3. TypeScript — no `any`, no `var`, no non-null assertions, proper error handling
            4. Architecture — SRP violations, leaky abstractions, anti-patterns
            5. Code smells — empty catches, magic numbers, deep nesting

            For each issue, post an inline comment using create_inline_comment on the exact line.
            State what's wrong, why it matters, and how to fix it.
            After all inline comments, post ONE summary comment via `gh pr comment`.
            Then STOP — do not continue reading files or looking for more issues.
