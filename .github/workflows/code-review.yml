# Claude Code Review — automated PR review via anthropics/claude-code-action
# Requires CLAUDE_CODE_OAUTH_TOKEN secret (from `claude setup-token`)
# Install the Claude GitHub App first: https://github.com/apps/claude

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    # Run on PR events always; on comment events only when @claude is mentioned
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-opus-4-6
          allowed_bots: "claude[bot]"
          show_full_output: true
          claude_args: |
            --max-turns 15 --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"
          prompt: |
            You are a senior staff engineer reviewing a pull request.
            Read CLAUDE.md at the repo root for the engineering standards, then review ONLY the changed files.

            Use `gh pr diff ${{ github.event.pull_request.number }}` to see the diff.
            Focus exclusively on the lines that changed.

            ## Anti-Hallucination Rules
            1. **Quote before commenting.** For EVERY issue you report, first extract the exact line from the diff output as a direct quote. If you cannot produce a verbatim quote, DO NOT comment — the code may not exist.
            2. **Only use the diff as your source.** Do not use general knowledge about what code "should" look like. Base every claim exclusively on the diff output from `gh pr diff`.
            3. **Verify after drafting.** After drafting each comment, re-check: does the quoted code actually appear in the diff? If you cannot find the supporting quote, retract the comment.
            4. **Say "I'm not sure" when uncertain.** If you're unsure whether something is an issue or if you lack context, say so explicitly rather than guessing. It is better to skip a comment than to fabricate one.
            5. **Never infer, reconstruct, or imagine code** that is not in the diff. Do not combine fragments from different files into a pattern that doesn't exist.

            ## Standards Checklist
            Check EVERY changed line against these rules (ordered by severity):

            ### Critical (block PR)
            1. **No `any`** — use `unknown`, generics, or proper types
            2. **No magic numbers** — extract to named `const` (ESLint: `@typescript-eslint/no-magic-numbers`)
            3. **No empty catch blocks** — every catch must log or handle the error meaningfully
            4. **No non-null assertions (`!`)** — handle nullability explicitly
            5. **Security** — no injection, credential exposure, or unsafe input handling

            ### High (block PR)
            6. **Proper error handling** — no swallowed promises, no bare `catch {}` with only comments
            7. **Functions under 40 lines** — extract helpers if longer
            8. **Max 3 parameters** — use options object for more
            9. **No `var`** — use `const` (preferred) or `let`
            10. **Conventional commits** — `feat:`, `fix:`, `chore:`, `refactor:`, `test:`, `docs:`

            ### Medium (comment but can approve)
            11. **Architecture** — SRP violations, leaky abstractions, prop drilling > 2 levels
            12. **Naming** — `getUserById` not `getData`, `isValid` not `check`
            13. **Early returns** — guard clauses first, happy path last
            14. **Test quality** — test behavior not implementation, descriptive names, AAA pattern

            ## Review Decision
            After reviewing ALL changed files, make ONE of these decisions:

            **If you find Critical or High issues:**
            - Post an inline comment for each issue using create_inline_comment on the exact line.
            - State what's wrong, why it matters, and how to fix it.
            - Post ONE summary comment via `gh pr comment` listing all findings.
            - Do NOT approve the PR.

            **If the code is clean (no Critical/High issues):**
            - Approve the PR: `gh pr review ${{ github.event.pull_request.number }} --approve --body "Code review passed — no issues found."`
            - If there are Medium issues, mention them in the approval comment as suggestions.

            Then STOP — do not continue reading files or looking for more issues.
