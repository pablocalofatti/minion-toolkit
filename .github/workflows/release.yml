# Release — auto-bump version and create GitHub Release on push to main.
# Reads conventional commit messages since last tag to determine semver bump.
# Creates a git tag + GitHub Release with auto-generated changelog.
# Version is tracked via git tags; CHANGELOG.md is updated via a PR.

name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    # Skip release commits and changelog PRs
    if: >-
      !startsWith(github.event.head_commit.message, 'chore(release):') &&
      !startsWith(github.event.head_commit.message, 'docs(changelog):')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Determine version bump
        id: bump
        run: |
          # Get the latest tag, or use initial commit if no tags exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            COMMIT_RANGE="HEAD"
            CURRENT_VERSION=$(node -p "require('./mcp-server/package.json').version")
          else
            COMMIT_RANGE="${LATEST_TAG}..HEAD"
            CURRENT_VERSION="${LATEST_TAG#v}"
          fi

          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "commit_range=$COMMIT_RANGE" >> $GITHUB_OUTPUT

          # Parse conventional commits to determine bump type
          COMMITS=$(git log $COMMIT_RANGE --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          HAS_BREAKING=$(echo "$COMMITS" | grep -c '!:' || true)
          HAS_FEAT=$(echo "$COMMITS" | grep -c '^feat' || true)
          HAS_FIX=$(echo "$COMMITS" | grep -c '^fix' || true)

          if [ "$HAS_BREAKING" -gt 0 ]; then
            BUMP="major"
          elif [ "$HAS_FEAT" -gt 0 ]; then
            BUMP="minor"
          elif [ "$HAS_FIX" -gt 0 ]; then
            BUMP="patch"
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::No version-bumping commits found — skipping release."
            exit 0
          fi

          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

          # Calculate new version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "::notice::Bumping $CURRENT_VERSION → $NEW_VERSION ($BUMP)"

      - name: Generate release notes
        if: steps.bump.outputs.skip != 'true'
        id: notes
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          COMMIT_RANGE="${{ steps.bump.outputs.commit_range }}"

          # Group commits by type (use tab as delimiter)
          if [ "$COMMIT_RANGE" = "HEAD" ]; then
            COMMITS=$(git log --pretty=format:"%s%x09%h" --reverse)
          else
            COMMITS=$(git log ${COMMIT_RANGE} --pretty=format:"%s%x09%h" --reverse)
          fi

          FEATURES=""
          FIXES=""
          OTHER=""

          while IFS=$'\t' read -r MSG HASH; do
            [ -z "$MSG" ] && continue
            if [[ "$MSG" == feat:* ]] || [[ "$MSG" == feat\(*\):* ]]; then
              CLEAN=$(echo "$MSG" | sed 's/^feat[^:]*: //')
              FEATURES="${FEATURES}"$'\n'"- ${CLEAN} (\`${HASH}\`)"
            elif [[ "$MSG" == fix:* ]] || [[ "$MSG" == fix\(*\):* ]]; then
              CLEAN=$(echo "$MSG" | sed 's/^fix[^:]*: //')
              FIXES="${FIXES}"$'\n'"- ${CLEAN} (\`${HASH}\`)"
            elif [[ "$MSG" == chore:* ]] || [[ "$MSG" == chore\(*\):* ]] || [[ "$MSG" == refactor:* ]] || [[ "$MSG" == test:* ]] || [[ "$MSG" == docs:* ]]; then
              CLEAN=$(echo "$MSG" | sed 's/^[a-z]*[^:]*: //')
              OTHER="${OTHER}"$'\n'"- ${CLEAN} (\`${HASH}\`)"
            fi
          done <<< "$COMMITS"

          # Build release body
          BODY=""
          if [ -n "$FEATURES" ]; then
            BODY="${BODY}### Added${FEATURES}"$'\n\n'
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}### Fixed${FIXES}"$'\n\n'
          fi
          if [ -n "$OTHER" ]; then
            BODY="${BODY}### Other${OTHER}"$'\n\n'
          fi

          # Save to file (avoids shell quoting issues)
          echo "$BODY" > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Create tag and GitHub Release
        if: steps.bump.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${NEW_VERSION}"
          git push --tags

          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION}" \
            --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CHANGELOG.md and package.json via PR
        if: steps.bump.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          DATE=$(date +%Y-%m-%d)
          BRANCH="chore/release-v${NEW_VERSION}"

          git checkout -b "$BRANCH"

          # Update package.json version
          cd mcp-server
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${NEW_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cd ..

          # Build changelog entry
          NOTES=$(cat /tmp/release-notes.md)
          ENTRY="## [${NEW_VERSION}] - ${DATE}"$'\n\n'"${NOTES}"

          if [ -f CHANGELOG.md ]; then
            awk -v entry="$ENTRY" '
              /^# Changelog/ { print; print ""; print entry; next }
              { print }
            ' CHANGELOG.md > /tmp/changelog-new.md
            mv /tmp/changelog-new.md CHANGELOG.md
          else
            printf "# Changelog\n\n%s\n" "$ENTRY" > CHANGELOG.md
          fi

          git add mcp-server/package.json CHANGELOG.md
          git commit -m "chore(release): v${NEW_VERSION} — update changelog and version"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore(release): v${NEW_VERSION}" \
            --body "Auto-generated release bookkeeping for v${NEW_VERSION}. Updates CHANGELOG.md and package.json version. Merge with admin bypass (CI won't run on GITHUB_TOKEN-created PRs)." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
