# Auto Fix CI — when CI fails on a PR, Claude reads the errors, fixes the code, and pushes.
# Triggers via workflow_run after CI completes with failure.
# Loop prevention: stops if the last commit starts with "fix(auto):".

name: Auto Fix CI

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  auto-fix:
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.pull_requests[0] != null &&
      github.event.workflow_run.head_branch != 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: auto-fix-${{ github.event.workflow_run.head_branch }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      actions: read
      issues: write
      id-token: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 10

      - name: Check if latest commit is already an auto-fix
        id: loop_check
        run: |
          LAST_MSG=$(git log -1 --pretty=%s)
          if [[ "$LAST_MSG" == fix\(auto\):* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::Skipping auto-fix — last commit is already an auto-fix attempt."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Get CI failure details
        if: steps.loop_check.outputs.skip == 'false'
        id: failure_details
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }}
            });
            const failedJobs = jobs.data.jobs.filter(j => j.conclusion === 'failure');
            const errorLogs = [];
            for (const job of failedJobs) {
              try {
                const logs = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  job_id: job.id
                });
                errorLogs.push({
                  jobName: job.name,
                  logs: typeof logs.data === 'string'
                    ? logs.data.slice(-8000)
                    : JSON.stringify(logs.data).slice(-8000)
                });
              } catch (e) {
                errorLogs.push({ jobName: job.name, logs: `Failed to download: ${e.message}` });
              }
            }
            return {
              prNumber: ${{ github.event.workflow_run.pull_requests[0].number }},
              failedJobs: failedJobs.map(j => j.name),
              errorLogs
            };

      - name: Setup pnpm
        if: steps.loop_check.outputs.skip == 'false'
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        if: steps.loop_check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: mcp-server/pnpm-lock.yaml

      - name: Install dependencies
        if: steps.loop_check.outputs.skip == 'false'
        run: pnpm install --frozen-lockfile
        working-directory: mcp-server

      - name: Fix CI failures with Claude
        if: steps.loop_check.outputs.skip == 'false'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 20 --allowedTools "Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(pnpm:*),Bash(git:*),Bash(cd:*)"
          prompt: |
            You are an expert TypeScript engineer fixing CI failures on a pull request.

            ## Context
            - Working directory: mcp-server/
            - PR #${{ fromJSON(steps.failure_details.outputs.result).prNumber }} on branch "${{ github.event.workflow_run.head_branch }}"
            - Read CLAUDE.md at the repo root for engineering standards.

            ## CI Failures
            Failed jobs: ${{ join(fromJSON(steps.failure_details.outputs.result).failedJobs, ', ') }}

            Error logs:
            ${{ toJSON(fromJSON(steps.failure_details.outputs.result).errorLogs) }}

            ## Instructions
            1. Analyze the error logs to understand what failed (typecheck, lint, or tests).
            2. Read the relevant source files in mcp-server/src/ and mcp-server/tests/.
            3. Fix the root cause. Do NOT suppress errors with @ts-ignore, eslint-disable, or skip().
            4. Run: cd mcp-server && pnpm run check
            5. If checks pass, commit ALL changed files: git add -A && git commit -m "fix(auto): <description>"
            6. If checks still fail, fix remaining errors (up to 2 attempts).
            7. Only commit if all checks pass. Do NOT commit broken code.
            8. Push: git push
            9. Post a summary comment: gh pr comment ${{ fromJSON(steps.failure_details.outputs.result).prNumber }} --body "..."
            10. Then STOP.

            ## Rules
            - Follow CLAUDE.md engineering standards strictly.
            - Maintain 100% test coverage.
            - Do NOT modify vitest.config.ts, eslint.config.js, or tsconfig.json.
            - Do NOT install new dependencies.
